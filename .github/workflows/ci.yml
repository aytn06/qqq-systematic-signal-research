name: tests

on:
  push:
  pull_request:

jobs:
  test:
    name: test suite
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: tests
        run: pytest -q

      - name: backtest
        run: python -m src.run_backtest

      - name: reports
        run: python -m src.build_reports
